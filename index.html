<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UFO Arena Combat</title>

<style>
body { margin:0; background: green; overflow:hidden; }
canvas { display:block; margin:auto; background:#141432; }

/* MOBILE CONTROLS */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: none;
    justify-content: space-between;
}

#joystick {
    width: 120px;
    height: 120px;
    margin-left: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    position: relative;
    touch-action: none;
}

#stick {
    width: 50px;
    height: 50px;
    background: cyan;
    border-radius: 50%;
    position: absolute;
    left: 35px;
    top: 35px;
}

#buttons {
    margin-right: 20px;
}

button {
    padding: 15px;
    font-size: 16px;
    margin: 5px;
}
</style>
</head>

<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<!-- MOBILE UI -->
<div id="controls">
  <div id="joystick"><div id="stick"></div></div>
  <div id="buttons">
    <button id="shootBtn">Shoot</button>
    <button id="boostBtn">Boost</button>
  </div>
</div>

<script>

/* --------- DEVICE DETECTION --------- */
const isMobile = "ontouchstart" in window;
if(isMobile){
    document.getElementById("controls").style.display = "flex";
}

/* --------- PLAYER --------- */
class Player {
    constructor(x,y){
        this.x=x; this.y=y; this.radius=20;
        this.speed=4;
        this.bullets=[];
        this.rapid_fire=false;
        this.rapid_fire_end=0;
        this.last_shot=0;
    }
}

/* --------- BULLET --------- */
class Bullet {
    constructor(x,y,vx,vy){
        this.x=x; this.y=y; this.vx=vx; this.vy=vy;
        this.radius=4;
    }
}

/* --------- ENEMY --------- */
class Enemy {
    constructor(x,y,speed){
        this.x=x; this.y=y; this.speed=speed;
        this.radius=12; this.health=1;
    }
    moveToward(player){
        let dx=player.x-this.x;
        let dy=player.y-this.y;
        let dist=Math.hypot(dx,dy);
        if(dist>0){
            this.x+=dx/dist*this.speed;
            this.y+=dy/dist*this.speed;
        }
    }
}

/* --------- POWERUP --------- */
class Powerup {
    constructor(x,y,type){
        this.x=x; this.y=y; this.radius=10;
        this.type=type;
    }
    apply(player){
        if(this.type=="rapid"){
            player.rapid_fire=true;
            player.rapid_fire_end=Date.now()+5000;
        } else {
            score+=50;
        }
    }
    getColor(){
        return this.type=="rapid"?"orange":"yellow";
    }
}

/* --------- GAME SETUP --------- */
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let player=new Player(400,300);
let enemies=[], powerups=[];
let score=0, combo=0, combo_timer=0;
let start_time=Date.now();
let game_over=false, paused=false;
let difficulty=0, enemy_spawn_counter=0;

const keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* --------- JOYSTICK --------- */
let joyX=0, joyY=0;

if(isMobile){
    const joystick=document.getElementById("joystick");
    const stick=document.getElementById("stick");
    let dragging=false;

    joystick.addEventListener("touchstart",()=>dragging=true);

    joystick.addEventListener("touchend",()=>{
        dragging=false;
        joyX=joyY=0;
        stick.style.left="35px";
        stick.style.top="35px";
    });

    joystick.addEventListener("touchmove",e=>{
        if(!dragging) return;

        const rect=joystick.getBoundingClientRect();
        const t=e.touches[0];

        let x=t.clientX-rect.left-60;
        let y=t.clientY-rect.top-60;

        let dist=Math.hypot(x,y);
        let max=40;

        if(dist>max){
            x=x/dist*max;
            y=y/dist*max;
        }

        joyX=x/max;
        joyY=y/max;

        stick.style.left=(x+35)+"px";
        stick.style.top=(y+35)+"px";
    });

    document.getElementById("shootBtn").ontouchstart=()=>mouseDown=true;
    document.getElementById("shootBtn").ontouchend=()=>mouseDown=false;

    document.getElementById("boostBtn").ontouchstart=()=>keys[" "]=true;
    document.getElementById("boostBtn").ontouchend=()=>keys[" "]=false;
}

/* --------- SPAWN --------- */
function spawnEnemy(){
    let side=["top","bottom","left","right"][Math.random()*4|0];
    let x,y;

    if(side=="top"){x=Math.random()*800;y=-30;}
    else if(side=="bottom"){x=Math.random()*800;y=630;}
    else if(side=="left"){x=-30;y=Math.random()*600;}
    else {x=830;y=Math.random()*600;}

    enemies.push(new Enemy(x,y,1.5+difficulty*0.2));
}

/* --------- GAME LOOP --------- */
let mouseX=0, mouseY=0, mouseDown=false;

canvas.onmousemove=e=>{
    mouseX=e.offsetX;
    mouseY=e.offsetY;
};
canvas.onmousedown=()=>mouseDown=true;
canvas.onmouseup=()=>mouseDown=false;

function gameLoop(){
requestAnimationFrame(gameLoop);

if(!paused && !game_over){

    // MOVEMENT (keyboard + joystick)
    let dx = joyX * player.speed;
    let dy = joyY * player.speed;

    if(keys["a"]) dx=-player.speed;
    if(keys["d"]) dx=player.speed;
    if(keys["w"]) dy=-player.speed;
    if(keys["s"]) dy=player.speed;

    if(keys[" "]){ dx*=1.5; dy*=1.5; }

    player.x=Math.max(10,Math.min(player.x+dx,790));
    player.y=Math.max(10,Math.min(player.y+dy,590));

    // SHOOT
    let now=Date.now();
    if(mouseDown && now-player.last_shot>(player.rapid_fire?20:50)){
        let dxm=mouseX-player.x, dym=mouseY-player.y;
        let dist=Math.hypot(dxm,dym)||1;
        player.bullets.push(new Bullet(player.x,player.y,dxm/dist*8,dym/dist*8));
        player.last_shot=now;
    }

    // BULLETS
    player.bullets=player.bullets.filter(b=>{
        b.x+=b.vx; b.y+=b.vy;
        return b.x>-10&&b.x<810&&b.y>-10&&b.y<610;
    });

    // ENEMIES
    enemies.forEach(e=>e.moveToward(player));

    enemies=enemies.filter(e=>{
        for(let b of player.bullets){
            if(Math.hypot(b.x-e.x,b.y-e.y)<25){
                e.health--;
            }
        }
        if(e.health<=0){
            score+=10;
            return false;
        }
        if(Math.hypot(player.x-e.x,player.y-e.y)<40){
            game_over=true;
        }
        return true;
    });

    // SPAWN
    enemy_spawn_counter++;
    if(enemy_spawn_counter>Math.max(20,100-difficulty*8)){
        enemy_spawn_counter=0;
        spawnEnemy();
    }

    difficulty=(Date.now()-start_time)/15000;
}

// DRAW
ctx.fillStyle="#141432";
ctx.fillRect(0,0,800,600);

// PLAYER
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,Math.PI*2);
ctx.fill();

// HUD
ctx.fillStyle="white";
ctx.fillText("Score: "+score,10,20);

if(game_over){
    ctx.fillStyle="red";
    ctx.font="30px sans-serif";
    ctx.fillText("YOU DIED",300,300);
}

}

document.addEventListener("keydown",e=>{
    if(e.key=="r" && game_over){
        location.reload();
    }
});

gameLoop();

</script>
</body>
</html>
